version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trackall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       trackall_db
      POSTGRES_USER:     trackall
      POSTGRES_PASSWORD: trackall_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackall -d trackall_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trackall-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: trackall-backend
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      PORT:              4000
      DATABASE_URL:      postgresql://trackall:trackall_pass@postgres:5432/trackall_db
      REDIS_URL:         redis://redis:6379
      JWT_SECRET:        ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-production}
      FRONTEND_URL:      ${FRONTEND_URL:-http://localhost:3000}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      SMTP_HOST:         ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:         ${SMTP_PORT:-587}
      SMTP_USER:         ${SMTP_USER:-}
      SMTP_PASS:         ${SMTP_PASS:-}
      AFTERSHIP_API_KEY: ${AFTERSHIP_API_KEY:-}
      SHIPROCKET_EMAIL:  ${SHIPROCKET_EMAIL:-}
      SHIPROCKET_PASSWORD: ${SHIPROCKET_PASSWORD:-}
      DELHIVERY_API_KEY: ${DELHIVERY_API_KEY:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: trackall-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:    http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
